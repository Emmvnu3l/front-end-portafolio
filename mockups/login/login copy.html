<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login (Mockup)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <main id="main-content" class="login-page">
    <section class="login-shell" aria-label="Acceso de usuario">
      <article class="login-card surface shadow-soft">
        <header class="login-header">
          <p class="login-brand">Crisol Sync</p>
          <h1 class="login-title">Welcome back!</h1>
          <p class="text-muted login-subtitle">Ingresa tus credenciales para acceder a tu cuenta</p>
        </header>

        <div id="login-error" class="alert alert-danger d-none" role="alert" aria-live="polite"></div>

        <form id="login-form" class="vstack gap-3" novalidate>
          <div>
            <label for="email" class="form-label">Email</label>
            <input id="email" class="form-control" type="email" autocomplete="email" placeholder="tu@email.com" required />
          </div>

          <div>
            <div class="login-row-between">
              <label for="password" class="form-label mb-0">Contraseña</label>
              <a class="login-link" href="#" aria-label="Recuperar contraseña">¿Olvidaste tu contraseña?</a>
            </div>
            <input id="password" class="form-control mt-2" type="password" autocomplete="current-password" required />
          </div>

          <label class="login-remember">
            <input type="checkbox" />
            <span>Recordarme por 30 días</span>
          </label>

          <button id="login-submit" class="btn btn-primary w-100" type="submit">
            Entrar
          </button>
        </form>

        <div class="auth-divider" aria-hidden="true">
          <span>o</span>
        </div>

        <section class="google-auth" aria-label="Inicio de sesión con Google">
          <div id="g_id_onload" data-client_id="824239424492-jk5ajgg4i9e5uv8bgdld5u1mknht8jc0.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>

          <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-shape="pill"
            data-logo_alignment="left" data-width="300"></div>
        </section>

        <p class="login-signup">
          ¿No tienes cuenta?
          <a class="login-link" href="#">Regístrate</a>
        </p>
      </article>

      <aside class="login-visual surface shadow-soft" aria-hidden="true">
        <img
          src="https://images.unsplash.com/photo-1614594975525-e45190c55d0b?auto=format&fit=crop&w=1400&q=80"
          alt=""
          loading="lazy"
        />
      </aside>
    </section>
  </main>

  <script src="./script.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</body>

</html>
