<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login (Mockup)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  
  <main id="main-content" class="login-page">
    
    <section class="login-panel" aria-label="Acceso de usuario">
      <div class="login-shell row g-0 align-items-stretch">
        <div class="col-12 col-lg-6 panel-left">

          <article class="login-card surface shadow-soft">

            <header class="login-header">
            </header>

            <div id="login-error" class="alert alert-danger d-none" role="alert" aria-live="polite"></div>

            <form id="login-form" class="vstack gap-3" novalidate>
              <div>
                <input id="email" class="form-control" type="email" autocomplete="email" placeholder="correo"
                  required />
              </div>

              <div>
                <div class="login-row-between">
                  <input id="email" class="form-control" type="email" autocomplete="email" placeholder="password"
                    required />
                  <a class="login-link" href="#" aria-label="Recuperar contraseña">Olvidé mi contraseña</a>
                </div>
              </div>

              <button id="login-submit" class="btn btn-primary w-100" type="submit">
                Iniciar sesión
              </button>
            </form>

            <div class="auth-divider" aria-hidden="true">
              <span>o</span>
            </div>

            <section class="google-auth" aria-label="Inicio de sesión con Google">
              <div id="g_id_onload"
                data-client_id="824239424492-jk5ajgg4i9e5uv8bgdld5u1mknht8jc0.apps.googleusercontent.com"
                data-callback="handleCredentialResponse"></div>

              <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-shape="pill"
                data-logo_alignment="left" data-width="300"></div>
            </section>

            <p class="login-signup">
              ¿No tienes cuenta?
              <a class="login-link" href="#">Regístrate</a>
            </p>
          </article>
        </div>


      </div>
    </section>
  </main>

  <script src="./script.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</body>

</html>
