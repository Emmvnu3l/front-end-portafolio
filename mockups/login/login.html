<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login (Mockup)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>

  <main id="main-content" class="container py-4 py-md-5">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-7 col-lg-5">
        <div class="surface shadow-soft p-4 p-md-5">
          <h1 class="h4 mb-2">Iniciar sesión</h1>
          <p class="text-muted mb-4">
            Bienvenido
          </p>

          <div id="login-error" class="alert alert-danger d-none" role="alert" aria-live="polite"></div>

          <form id="login-form" class="vstack gap-3" novalidate>
            <div>
              <label for="email" class="form-label">Email</label>
              <input id="email" class="form-control" type="email" autocomplete="email" required />
            </div>

            <div>
              <label for="password" class="form-label">Contraseña</label>
              <input id="password" class="form-control" type="password" autocomplete="current-password" required />
            </div>

            <button id="login-submit" class="btn btn-primary w-100" type="submit">
              Entrar
            </button>
          </form>

          <div class="auth-divider" aria-hidden="true">
            <span>o continúa con</span>
          </div>

          <section class="google-auth" aria-label="Inicio de sesión con Google">
            <div id="g_id_onload" data-client_id="TU_CLIENT_ID_AQUI" data-callback="handleCredentialResponse"></div>

            <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-shape="pill"
              data-logo_alignment="left" data-width="300"></div>
          </section>
        </div>
      </div>
    </div>
  </main>

  <script src="./script.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    function handleCredentialResponse(response) {
      const jwt = response.credential;

      console.log("JWT:", jwt);

      // Decodificar el token
      const payload = JSON.parse(atob(jwt.split('.')[1]));

      console.log("Usuario:", payload);

      // Ejemplo:
      document.body.innerHTML = `
      <h2>Bienvenido ${payload.name}</h2>
      <img src="${payload.picture}" width="100"/>
      <p>${payload.email}</p>
    `;
    }
  </script>
</body>

</html>
